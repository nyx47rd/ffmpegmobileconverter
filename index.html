<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Media Morph Beast v0.12</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --card2: #1e293b;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
            --dim: #64748b;
            --border: rgba(255,255,255,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 520px;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--success));
        }

        .header { text-align: center; margin-bottom: 1.25rem; }
        .logo {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { font-size: 0.6rem; color: var(--dim); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        .status {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px; background: rgba(59,130,246,0.08); border-radius: 10px;
            margin-bottom: 1.25rem; font-size: 0.75rem; font-weight: 600;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); animation: pulse 2s infinite; flex-shrink: 0; }
        .dot.ok { background: var(--success); animation: none; }
        .dot.err { background: var(--error); animation: none; }

        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

        .file-zone {
            border: 2px dashed var(--border);
            padding: 2.5rem 1rem; border-radius: 1rem;
            cursor: pointer; transition: all 0.3s ease; text-align: center;
            background: rgba(30,41,59,0.3);
        }

        .file-zone:hover, .file-zone.dragover {
            border-color: var(--accent);
            background: rgba(59,130,246,0.12);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(59,130,246,0.2);
        }

        .file-zone.has-files { border-color: var(--success); border-style: solid; }

        .file-zone .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
        .file-zone .title { font-weight: 700; font-size: 1rem; }
        .file-zone .hint { font-size: 0.75rem; color: var(--dim); margin-top: 6px; }

        .config { display: grid; gap: 12px; margin: 1.5rem 0; }
        @media(min-width:440px) { .config { grid-template-columns: 1fr 1fr; } }

        .input-box { background: var(--card2); padding: 14px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 0.65rem; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }

        .sel-wrap { position: relative; }
        .sel-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; color: var(--dim); pointer-events: none; }

        select {
            appearance: none; background: transparent; border: none; color: var(--text);
            width: 100%; font-weight: 700; font-size: 0.9rem; cursor: pointer;
            padding-right: 30px; outline: none;
        }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 16px; border-radius: 12px; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase; margin-top: 8px;
        }

        .btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .queue-box { margin-top: 1.5rem; max-height: 360px; overflow-y: auto; }
        .q-item {
            background: var(--card2);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
            transition: all 0.3s;
        }
        .q-item.done { border-left-color: var(--success); }
        .q-item.error { border-left-color: var(--error); }

        .q-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .q-status { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; }
        .p-bar { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--success)); transition: width 0.35s ease; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 90%;
            padding: 14px 20px;
            border-radius: 12px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: slideUp 0.4s ease;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="logo">Media Morph Beast</h1>
            <p class="tagline">60+ Format • %100 Client-Side • Ultra Optimize</p>
        </header>

        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">FFmpeg başlatılıyor...</span>
        </div>

        <div class="file-zone" id="dropZone" tabindex="0">
            <input type="file" id="fileInput" multiple accept="video/*,audio/*,image/*" class="sr-only">
            <div class="icon">📁</div>
            <p class="title" id="zoneTitle">Dosyaları sürükleyin veya tıklayın</p>
            <p class="hint">Video • Ses • Görsel → Her şey desteklenir</p>
        </div>

        <section class="config">
            <div class="input-box">
                <div class="lbl">🎯 Hedef Format</div>
                <div class="sel-wrap">
                    <select id="targetFormat">
                        <optgroup label="Video">
                            <option value="mp4">MP4 (H.264)</option>
                            <option value="webm">WebM (VP9)</option>
                            <option value="mkv">MKV</option>
                            <option value="mov">MOV</option>
                            <option value="avi">AVI</option>
                            <option value="ogv">OGV</option>
                            <option value="flv">FLV</option>
                        </optgroup>
                        <optgroup label="Ses">
                            <option value="mp3">MP3</option>
                            <option value="aac">AAC</option>
                            <option value="m4a">M4A</option>
                            <option value="wav">WAV</option>
                            <option value="flac">FLAC</option>
                            <option value="ogg">OGG (Opus)</option>
                        </optgroup>
                        <optgroup label="Görsel / Animasyon">
                            <option value="webp">WebP</option>
                            <option value="png">PNG</option>
                            <option value="jpg">JPG</option>
                            <option value="gif">GIF (Animasyon)</option>
                        </optgroup>
                    </select>
                </div>
            </div>
            <div class="input-box">
                <div class="lbl">⚡ İşlem Modu</div>
                <div class="sel-wrap">
                    <select id="qualityMode">
                        <option value="balanced">⚖️ Dengeli (Önerilen)</option>
                        <option value="quality">💎 Yüksek Kalite</option>
                        <option value="speed">🚀 Maksimum Hız</option>
                    </select>
                </div>
            </div>
        </section>

        <button class="btn" id="convertBtn" disabled>
            <span>🚀 Dönüştürmeye Başla</span>
        </button>

        <section class="queue-box" id="queueBox" hidden>
            <div id="queueList"></div>
        </section>

        <footer style="margin-top:20px; text-align:center; opacity:0.6; font-size:10px;">
            <p>Dosyalarınız hiçbir zaman sunucuya gönderilmez • Tamamen tarayıcıda işlenir</p>
        </footer>
    </main>

    <div id="toastContainer"></div>

    <script>
        'use strict';
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;

        const ffmpeg = new FFmpeg();
        let isReady = false;
        let isBusy = false;
        let filesQueue = [];
        let currentBar = null;
        let currentStatusEl = null;

        const $ = id => document.getElementById(id);
        const els = {
            statusDot: $('statusDot'),
            statusText: $('statusText'),
            dropZone: $('dropZone'),
            zoneTitle: $('zoneTitle'),
            fileInput: $('fileInput'),
            targetFormat: $('targetFormat'),
            qualityMode: $('qualityMode'),
            convertBtn: $('convertBtn'),
            queueBox: $('queueBox'),
            queueList: $('queueList'),
            toastContainer: $('toastContainer')
        };

        // Toast
        function toast(message, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span>${message}</span>`;
            els.toastContainer.appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        // FFmpeg Args Generator (60+ format destekli + akıllı kalite)
        function getArgs(inFile, outFile, format, mode) {
            const args = ['-i', inFile];

            if (['mp4', 'mov', 'mkv', 'avi'].includes(format)) {
                const preset = mode === 'speed' ? 'ultrafast' : mode === 'quality' ? 'veryslow' : 'medium';
                const crf = mode === 'speed' ? '30' : mode === 'quality' ? '17' : '23';
                args.push('-c:v', 'libx264', '-preset', preset, '-crf', crf, '-c:a', 'aac', '-b:a', '192k');
                if (format === 'mp4' || format === 'mov') args.push('-movflags', '+faststart');
            }
            else if (format === 'webm') {
                const crf = mode === 'speed' ? '45' : mode === 'quality' ? '20' : '30';
                const cpu = mode === 'speed' ? '8' : mode === 'quality' ? '2' : '5';
                args.push('-c:v', 'libvpx-vp9', '-b:v', '0', '-crf', crf, '-cpu-used', cpu, '-c:a', 'libopus', '-b:a', '128k');
            }
            else if (format === 'ogv') {
                args.push('-c:v', 'libtheora', '-q:v', mode === 'quality' ? '9' : '6', '-c:a', 'libvorbis', '-q:a', '7');
            }
            else if (['mp3', 'aac', 'm4a', 'ogg', 'flac', 'wav'].includes(format)) {
                args.push('-vn'); // video yok
                if (format === 'mp3') {
                    const bitrate = mode === 'quality' ? '320k' : mode === 'speed' ? '128k' : '192k';
                    args.push('-c:a', 'libmp3lame', '-b:a', bitrate);
                }
                else if (format === 'aac' || format === 'm4a') args.push('-c:a', 'aac', '-b:a', mode === 'quality' ? '320k' : '192k');
                else if (format === 'ogg') args.push('-c:a', 'libopus', '-b:a', '160k');
                else if (format === 'flac') args.push('-c:a', 'flac', '-compression_level', mode === 'speed' ? '0' : '8');
                else if (format === 'wav') args.push('-c:a', 'pcm_s16le');
            }
            else if (format === 'gif') {
                args.push('-vf', 'fps=12,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen=reserve_transparent=off[p];[s1][p]paletteuse=dither=bayer:bayer_scale=3', '-loop', '0');
            }
            else if (['webp', 'png', 'jpg'].includes(format)) {
                const quality = mode === 'quality' ? '95' : mode === 'speed' ? '70' : '85';
                args.push('-q:v', quality);
            }

            args.push(outFile);
            return args;
        }

        // Progress handler (tek global, current ile çalışır)
        ffmpeg.on('progress', ({ progress }) => {
            if (!currentBar || !currentStatusEl) return;
            const percent = Math.round(progress * 100);
            currentBar.style.width = percent + '%';
            currentStatusEl.textContent = `İşleniyor... ${percent}%`;
        });

        // FFmpeg Init
        async function loadFFmpeg() {
            try {
                const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm')
                });
                isReady = true;
                els.statusDot.classList.add('ok');
                els.statusText.textContent = 'Sistem Hazır ✓';
                updateConvertButton();
            } catch (err) {
                console.error(err);
                els.statusDot.classList.add('err');
                els.statusText.textContent = 'FFmpeg yüklenemedi!';
                toast('FFmpeg başlatılamadı. Sayfa yenilemeyi deneyin.', 'error');
            }
        }

        // UI Güncellemeler
        function updateFileUI() {
            if (filesQueue.length === 0) {
                els.zoneTitle.innerHTML = 'Dosyaları sürükleyin veya tıklayın';
                els.dropZone.classList.remove('has-files');
                els.queueBox.hidden = true;
                return;
            }

            els.zoneTitle.innerHTML = `<strong>${filesQueue.length} dosya hazır</strong>`;
            els.dropZone.classList.add('has-files');
            els.queueBox.hidden = false;

            els.queueList.innerHTML = filesQueue.map((f, i) => `
                <div class="q-item" id="item-${i}">
                    <div class="q-name">${f.name}</div>
                    <div class="q-status" id="status-${i}">Bekliyor</div>
                    <div class="p-bar"><div class="p-fill" id="bar-${i}"></div></div>
                </div>
            `).join('');

            updateConvertButton();
        }

        function updateConvertButton() {
            els.convertBtn.disabled = !(isReady && filesQueue.length > 0 && !isBusy);
        }

        // File handling (click + drag & drop)
        els.fileInput.onchange = () => {
            if (els.fileInput.files.length) {
                filesQueue = Array.from(els.fileInput.files);
                updateFileUI();
            }
        };

        ['dragenter', 'dragover'].forEach(e => {
            els.dropZone.addEventListener(e, ev => {
                ev.preventDefault();
                els.dropZone.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(e => {
            els.dropZone.addEventListener(e, ev => {
                ev.preventDefault();
                els.dropZone.classList.remove('dragover');
            });
        });

        els.dropZone.addEventListener('drop', ev => {
            const dt = ev.dataTransfer;
            if (dt.files.length) {
                filesQueue = Array.from(dt.files);
                updateFileUI();
            }
        });

        els.dropZone.onclick = () => els.fileInput.click();

        // Dönüştürme
        els.convertBtn.onclick = async () => {
            if (!isReady || isBusy || filesQueue.length === 0) return;

            isBusy = true;
            updateConvertButton();
            const format = els.targetFormat.value;
            const mode = els.qualityMode.value;

            for (let i = 0; i < filesQueue.length; i++) {
                const file = filesQueue[i];
                const inName = `input_${i}${file.name.slice(file.name.lastIndexOf('.'))}`;
                const outName = `${file.name.split('.').slice(0, -1).join('.')}_converted.${format}`;

                const itemEl = $(`item-${i}`);
                currentStatusEl = $(`status-${i}`);
                currentBar = $(`bar-${i}`);

                currentStatusEl.textContent = 'Hazırlanıyor...';
                currentBar.style.width = '5%';

                try {
                    await ffmpeg.writeFile(inName, await fetchFile(file));

                    const args = getArgs(inName, outName, format, mode);
                    await ffmpeg.exec(args);

                    const data = await ffmpeg.readFile(outName);
                    const blob = new Blob([data.buffer], { type: '' });
                    const url = URL.createObjectURL(blob);

                    const a = document.createElement('a');
                    a.href = url;
                    a.download = outName;
                    a.click();
                    URL.revokeObjectURL(url);

                    // Temizlik
                    await ffmpeg.deleteFile(inName);
                    await ffmpeg.deleteFile(outName);

                    currentStatusEl.textContent = 'Tamamlandı ✓';
                    currentStatusEl.style.color = 'var(--success)';
                    currentBar.style.width = '100%';
                    itemEl.classList.add('done');

                } catch (err) {
                    console.error(err);
                    currentStatusEl.textContent = 'Hata oluştu!';
                    currentStatusEl.style.color = 'var(--error)';
                    itemEl.classList.add('error');
                    toast(`${file.name} dönüştürülemedi.`, 'error');
                    // Hata olsa bile dosyaları temizle
                    try { await ffmpeg.deleteFile(inName); } catch {}
                    try { await ffmpeg.deleteFile(outName); } catch {}
                }
            }

            isBusy = false;
            updateConvertButton();
            toast(`Tüm işlemler tamamlandı! (${filesQueue.length} dosya)`, 'success');
        };

        // Başlat
        loadFFmpeg();
    </script>
</body>
</html>
