<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="50+ format destekli ücretsiz medya dönüştürücü">
    <meta name="theme-color" content="#020617">
    
    <title>Media Morph Beast | 50+ Formats</title>
    
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --card-hover: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --border: rgba(255,255,255,0.08);
            --shadow: rgba(0,0,0,0.4);
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --radius-sm: 0.75rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --touch-target: 44px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            -webkit-font-smoothing: antialiased;
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            padding: var(--space-lg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--success));
        }

        .header {
            text-align: center;
            margin-bottom: var(--space-lg);
        }

        .logo {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-xs);
        }

        .tagline {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: rgba(59, 130, 246, 0.1);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-lg);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            animation: pulse 2s infinite;
        }

        .status-dot.ready { background: var(--success); animation: none; }
        .status-dot.error { background: var(--error); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .file-zone {
            border: 2px dashed var(--border);
            padding: var(--space-xl) var(--space-md);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition-normal);
            text-align: center;
            background: rgba(30, 41, 59, 0.3);
            min-height: var(--touch-target);
        }

        .file-zone:hover,
        .file-zone.drag-over {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.08);
            transform: translateY(-2px);
        }

        .file-zone.has-files {
            border-color: var(--success);
            border-style: solid;
        }

        .file-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); display: block; }
        .file-text { font-weight: 700; font-size: 0.95rem; margin-bottom: var(--space-xs); }
        .file-hint { font-size: 0.7rem; color: var(--text-dim); }

        .file-count {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            background: var(--success);
            color: white;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: var(--space-sm);
        }

        .config-section {
            display: grid;
            gap: var(--space-md);
            margin: var(--space-lg) 0;
        }

        @media (min-width: 400px) {
            .config-section { grid-template-columns: 1fr 1fr; }
        }

        .input-group {
            background: var(--card-hover);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            transition: var(--transition-fast);
        }

        .input-group:focus-within { border-color: var(--accent); }
        .input-group.full-width { grid-column: 1 / -1; }

        .input-label {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--space-sm);
        }

        .select-wrapper { position: relative; }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            color: var(--text);
            width: 100%;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            padding-right: var(--space-md);
            min-height: var(--touch-target);
            font-family: inherit;
        }

        select:focus { outline: none; }
        option, optgroup { background: var(--card); color: var(--text); }
        optgroup { font-weight: 800; color: var(--accent); }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-normal);
            min-height: var(--touch-target);
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn.loading { position: relative; color: transparent; }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .queue-container {
            margin-top: var(--space-lg);
            max-height: 300px;
            overflow-y: auto;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-sm);
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        .queue-item {
            background: var(--card-hover);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-sm);
            border-left: 3px solid var(--accent);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .queue-item.processing { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.1); }
        .queue-item.completed { border-left-color: var(--success); }
        .queue-item.error { border-left-color: var(--error); background: rgba(239, 68, 68, 0.1); }

        .queue-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-sm);
        }

        .queue-item-name {
            font-weight: 700;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .queue-item-status {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--accent);
        }

        .queue-item-status.waiting { background: var(--text-dim); }
        .queue-item-status.processing { background: var(--warning); }
        .queue-item-status.completed { background: var(--success); }
        .queue-item-status.error { background: var(--error); }

        .queue-item-info {
            display: flex;
            gap: var(--space-md);
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: var(--space-sm);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.3s ease;
        }

        .progress-fill.error { background: var(--error); }

        .footer {
            margin-top: var(--space-lg);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-text { font-size: 0.65rem; color: var(--text-dim); }

        .footer-features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-sm);
        }

        .feature-badge {
            font-size: 0.6rem;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notification.success { background: var(--success); color: white; }
        .notification.error { background: var(--error); color: white; }
        .notification.warning { background: var(--warning); color: black; }
        .notification.info { background: var(--accent); color: white; }

        .notification-close {
            margin-left: auto;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            opacity: 0.7;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        [hidden] { display: none !important; }

        @media (max-width: 480px) {
            body { padding: var(--space-sm); }
            .container { padding: var(--space-md); border-radius: var(--radius-lg); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="container" role="main">
        <header class="header">
            <h1 class="logo">Media Morph Beast</h1>
            <p class="tagline">50+ Formats • Batch Processing • Browser-Based</p>
        </header>

        <div class="status-banner" role="status" aria-live="polite">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">FFmpeg yükleniyor...</span>
        </div>

        <div class="file-zone" id="fileZone" role="button" tabindex="0" aria-label="Dosya seçmek için tıklayın">
            <input type="file" id="fileInput" multiple accept="video/*,audio/*,image/*" class="sr-only">
            <span class="file-icon">📁</span>
            <p class="file-text" id="fileText">Dosyaları Seçin veya Sürükleyin</p>
            <p class="file-hint">Video, ses ve görsel formatları desteklenir</p>
        </div>

        <section class="config-section">
            <div class="input-group">
                <label class="input-label" for="targetFormat">
                    <span>🎯</span> Hedef Format
                </label>
                <div class="select-wrapper">
                    <select id="targetFormat">
                        <optgroup label="🎬 Video - Popüler">
                            <option value="mp4" data-type="video">MP4 (H.264)</option>
                            <option value="webm" data-type="video">WebM (VP9)</option>
                            <option value="mkv" data-type="video">MKV</option>
                            <option value="avi" data-type="video">AVI</option>
                            <option value="mov" data-type="video">MOV</option>
                        </optgroup>
                        <optgroup label="📱 Video - Mobil">
                            <option value="3gp" data-type="video">3GP</option>
                            <option value="m4v" data-type="video">M4V</option>
                            <option value="flv" data-type="video">FLV</option>
                            <option value="ts" data-type="video">TS</option>
                            <option value="m2ts" data-type="video">M2TS</option>
                        </optgroup>
                        <optgroup label="💿 Video - Arşiv">
                            <option value="wmv" data-type="video">WMV</option>
                            <option value="mpg" data-type="video">MPG</option>
                            <option value="mpeg" data-type="video">MPEG</option>
                            <option value="ogv" data-type="video">OGV</option>
                            <option value="vob" data-type="video">VOB</option>
                        </optgroup>
                        <optgroup label="🎵 Ses - Popüler">
                            <option value="mp3" data-type="audio">MP3</option>
                            <option value="aac" data-type="audio">AAC</option>
                            <option value="m4a" data-type="audio">M4A</option>
                            <option value="ogg" data-type="audio">OGG</option>
                            <option value="opus" data-type="audio">Opus</option>
                        </optgroup>
                        <optgroup label="🎧 Ses - Kayıpsız">
                            <option value="wav" data-type="audio">WAV</option>
                            <option value="flac" data-type="audio">FLAC</option>
                            <option value="aiff" data-type="audio">AIFF</option>
                        </optgroup>
                        <optgroup label="📞 Ses - Diğer">
                            <option value="wma" data-type="audio">WMA</option>
                            <option value="amr" data-type="audio">AMR</option>
                            <option value="ac3" data-type="audio">AC3</option>
                        </optgroup>
                        <optgroup label="🖼️ Görsel">
                            <option value="jpg" data-type="image">JPG</option>
                            <option value="png" data-type="image">PNG</option>
                            <option value="webp" data-type="image">WebP</option>
                            <option value="gif" data-type="image">GIF</option>
                            <option value="bmp" data-type="image">BMP</option>
                            <option value="tiff" data-type="image">TIFF</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="qualityMode">
                    <span>⚡</span> Kalite
                </label>
                <div class="select-wrapper">
                    <select id="qualityMode">
                        <option value="balanced">⚖️ Dengeli</option>
                        <option value="quality">💎 Yüksek Kalite</option>
                        <option value="speed">🚀 Hızlı</option>
                        <option value="tiny">📦 Min. Boyut</option>
                    </select>
                </div>
            </div>

            <details class="input-group full-width">
                <summary style="cursor:pointer;font-weight:700;font-size:0.8rem;color:var(--text-muted);">
                    ⚙️ Gelişmiş Ayarlar
                </summary>
                <div style="margin-top:var(--space-md);display:grid;gap:var(--space-sm);">
                    <div>
                        <label class="input-label" for="resolution">Çözünürlük</label>
                        <div class="select-wrapper">
                            <select id="resolution">
                                <option value="original">Orijinal</option>
                                <option value="1080">1080p</option>
                                <option value="720">720p</option>
                                <option value="480">480p</option>
                                <option value="360">360p</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="input-label" for="audioQuality">Ses Bitrate</label>
                        <div class="select-wrapper">
                            <select id="audioQuality">
                                <option value="320">320 kbps</option>
                                <option value="256">256 kbps</option>
                                <option value="192" selected>192 kbps</option>
                                <option value="128">128 kbps</option>
                            </select>
                        </div>
                    </div>
                </div>
            </details>
        </section>

        <button type="button" class="btn" id="convertBtn" disabled>
            <span>🚀</span>
            <span class="btn-text">DÖNÜŞTÜRMEYE BAŞLA</span>
        </button>

        <section class="queue-container" id="queueContainer" hidden>
            <div class="queue-header">
                <span>📋 İşlem Kuyruğu</span>
                <span id="queueStats">0/0</span>
            </div>
            <div id="queueList" role="list"></div>
        </section>

        <footer class="footer">
            <p class="footer-text">Tüm işlemler tarayıcınızda gerçekleşir</p>
            <div class="footer-features">
                <span class="feature-badge">🔒 Güvenli</span>
                <span class="feature-badge">⚡ Hızlı</span>
                <span class="feature-badge">📱 Mobil</span>
            </div>
        </footer>
    </main>

    <div id="notificationContainer"></div>

    <script>
        // ===== FFMPEG CORE CONFIGURATION =====
        // Using unpkg CDN with proper versioning for stability
        const FFMPEG_CONFIG = {
            // Version 0.12.6 is stable and well-tested
            baseURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd',
            get coreURL() { return `${this.baseURL}/ffmpeg-core.js`; },
            get wasmURL() { return `${this.baseURL}/ffmpeg-core.wasm`; }
        };

        // ===== STATE =====
        const state = {
            ffmpeg: null,
            isLoaded: false,
            isProcessing: false,
            files: [],
            completedCount: 0,
            errorCount: 0
        };

        // ===== ELEMENTS =====
        const $ = id => document.getElementById(id);
        const elements = {
            fileZone: $('fileZone'),
            fileInput: $('fileInput'),
            fileText: $('fileText'),
            convertBtn: $('convertBtn'),
            queueContainer: $('queueContainer'),
            queueList: $('queueList'),
            queueStats: $('queueStats'),
            statusDot: $('statusDot'),
            statusText: $('statusText'),
            targetFormat: $('targetFormat'),
            qualityMode: $('qualityMode'),
            resolution: $('resolution'),
            audioQuality: $('audioQuality'),
            notificationContainer: $('notificationContainer')
        };

        // ===== UTILITIES =====
        const utils = {
            formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },
            getExt(name) {
                return name.split('.').pop().toLowerCase();
            },
            truncate(name, max = 25) {
                if (name.length <= max) return name;
                const ext = this.getExt(name);
                return name.slice(0, max - ext.length - 4) + '...' + ext;
            },
            getMediaType(file) {
                if (file.type.startsWith('video/')) return 'video';
                if (file.type.startsWith('audio/')) return 'audio';
                if (file.type.startsWith('image/')) return 'image';
                return 'unknown';
            },
            getIcon(file) {
                const icons = { video: '🎬', audio: '🎵', image: '🖼️', unknown: '📄' };
                return icons[this.getMediaType(file)];
            }
        };

        // ===== NOTIFICATIONS =====
        const notify = {
            show(msg, type = 'success', duration = 4000) {
                const id = Date.now();
                const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
                const div = document.createElement('div');
                div.className = `notification ${type}`;
                div.id = `notif-${id}`;
                div.innerHTML = `
                    <span>${icons[type]}</span>
                    <span>${msg}</span>
                    <button class="notification-close">&times;</button>
                `;
                elements.notificationContainer.appendChild(div);
                div.querySelector('.notification-close').onclick = () => this.dismiss(id);
                if (duration > 0) setTimeout(() => this.dismiss(id), duration);
                return id;
            },
            dismiss(id) {
                const el = $(`notif-${id}`);
                if (el) {
                    el.style.animation = 'slideUp 0.3s ease reverse';
                    setTimeout(() => el.remove(), 300);
                }
            }
        };

        // ===== QUEUE =====
        const queue = {
            render() {
                if (state.files.length === 0) {
                    elements.queueContainer.hidden = true;
                    return;
                }
                elements.queueContainer.hidden = false;
                elements.queueList.innerHTML = state.files.map((file, i) => `
                    <div class="queue-item" id="queue-${i}" data-status="waiting">
                        <div class="queue-item-header">
                            <span class="queue-item-name">
                                ${utils.getIcon(file)} ${utils.truncate(file.name)}
                            </span>
                            <span class="queue-item-status waiting" id="status-${i}">Bekliyor</span>
                        </div>
                        <div class="queue-item-info">
                            <span>📦 ${utils.formatBytes(file.size)}</span>
                            <span>📄 ${utils.getExt(file.name).toUpperCase()}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-${i}"></div>
                        </div>
                    </div>
                `).join('');
                this.updateStats();
            },
            update(i, status, progress = null) {
                const item = $(`queue-${i}`);
                const statusEl = $(`status-${i}`);
                const progressEl = $(`progress-${i}`);
                if (!item) return;

                const labels = {
                    waiting: 'Bekliyor',
                    processing: 'İşleniyor...',
                    completed: 'Tamamlandı ✓',
                    error: 'Hata!'
                };

                item.className = `queue-item ${status}`;
                statusEl.textContent = labels[status];
                statusEl.className = `queue-item-status ${status}`;

                if (progress !== null) {
                    progressEl.style.width = `${progress}%`;
                }
                if (status === 'error') {
                    progressEl.classList.add('error');
                }
                this.updateStats();
            },
            updateStats() {
                elements.queueStats.textContent = `${state.completedCount}/${state.files.length}`;
            }
        };

        // ===== FILE HANDLING =====
        const fileHandler = {
            handle(files) {
                if (files.length === 0) return;
                state.files = Array.from(files);
                state.completedCount = 0;
                state.errorCount = 0;

                elements.fileZone.classList.add('has-files');
                elements.fileText.innerHTML = `
                    <strong>${state.files.length} dosya seçildi</strong>
                    <div class="file-count">
                        📁 ${utils.formatBytes(state.files.reduce((s, f) => s + f.size, 0))}
                    </div>
                `;
                elements.convertBtn.disabled = !state.isLoaded;
                queue.render();
                notify.show(`${state.files.length} dosya eklendi`, 'success');
            },
            setupDragDrop() {
                const zone = elements.fileZone;
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                    zone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
                });
                ['dragenter', 'dragover'].forEach(e => {
                    zone.addEventListener(e, () => zone.classList.add('drag-over'));
                });
                ['dragleave', 'drop'].forEach(e => {
                    zone.addEventListener(e, () => zone.classList.remove('drag-over'));
                });
                zone.addEventListener('drop', e => this.handle(e.dataTransfer.files));
                zone.addEventListener('keydown', e => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        elements.fileInput.click();
                    }
                });
            }
        };

        // ===== FFMPEG ENCODER CONFIG =====
        const encoder = {
            getQuality(mode) {
                const presets = {
                    quality: { crf: '18', preset: 'slow', audio: '320k' },
                    balanced: { crf: '23', preset: 'medium', audio: '192k' },
                    speed: { crf: '28', preset: 'ultrafast', audio: '128k' },
                    tiny: { crf: '35', preset: 'ultrafast', audio: '64k' }
                };
                return presets[mode] || presets.balanced;
            },
            buildArgs(input, format, settings) {
                const args = ['-i', input];
                const q = this.getQuality(settings.quality);

                // Resolution
                if (settings.resolution !== 'original') {
                    args.push('-vf', `scale=-2:${settings.resolution}`);
                }

                switch (format) {
                    case 'mp4':
                        args.push('-c:v', 'libx264', '-crf', q.crf, '-preset', q.preset,
                            '-c:a', 'aac', '-b:a', q.audio, '-movflags', '+faststart', '-pix_fmt', 'yuv420p');
                        break;
                    case 'webm':
                        args.push('-c:v', 'libvpx-vp9', '-crf', q.crf, '-b:v', '0',
                            '-cpu-used', q.preset === 'ultrafast' ? '8' : '4',
                            '-c:a', 'libopus', '-b:a', q.audio);
                        break;
                    case 'mkv':
                        args.push('-c:v', 'libx264', '-crf', q.crf, '-preset', q.preset,
                            '-c:a', 'aac', '-b:a', q.audio);
                        break;
                    case 'avi':
                        args.push('-c:v', 'mpeg4', '-q:v', '5', '-c:a', 'mp3', '-b:a', q.audio);
                        break;
                    case 'mov':
                        args.push('-c:v', 'libx264', '-crf', q.crf, '-preset', q.preset,
                            '-c:a', 'aac', '-b:a', q.audio, '-pix_fmt', 'yuv420p');
                        break;
                    case '3gp':
                        args.push('-c:v', 'h263', '-s', '352x288', '-c:a', 'aac', '-ar', '8000', '-ac', '1');
                        break;
                    case 'flv':
                        args.push('-c:v', 'flv1', '-q:v', '5', '-c:a', 'mp3', '-b:a', q.audio);
                        break;
                    case 'ts': case 'm2ts':
                        args.push('-c:v', 'libx264', '-crf', q.crf, '-preset', q.preset,
                            '-c:a', 'aac', '-b:a', q.audio, '-f', 'mpegts');
                        break;
                    case 'wmv':
                        args.push('-c:v', 'wmv2', '-q:v', '5', '-c:a', 'wmav2', '-b:a', q.audio);
                        break;
                    case 'mpg': case 'mpeg':
                        args.push('-c:v', 'mpeg2video', '-q:v', '5', '-c:a', 'mp2', '-b:a', q.audio);
                        break;
                    case 'ogv':
                        args.push('-c:v', 'libtheora', '-q:v', '7', '-c:a', 'libvorbis', '-q:a', '5');
                        break;
                    case 'mp3':
                        args.push('-vn', '-c:a', 'libmp3lame', '-b:a', settings.audioBitrate + 'k');
                        break;
                    case 'aac': case 'm4a':
                        args.push('-vn', '-c:a', 'aac', '-b:a', settings.audioBitrate + 'k');
                        break;
                    case 'ogg':
                        args.push('-vn', '-c:a', 'libvorbis', '-q:a', '6');
                        break;
                    case 'opus':
                        args.push('-vn', '-c:a', 'libopus', '-b:a', settings.audioBitrate + 'k');
                        break;
                    case 'wav':
                        args.push('-vn', '-c:a', 'pcm_s16le');
                        break;
                    case 'flac':
                        args.push('-vn', '-c:a', 'flac', '-compression_level', '8');
                        break;
                    case 'wma':
                        args.push('-vn', '-c:a', 'wmav2', '-b:a', settings.audioBitrate + 'k');
                        break;
                    case 'aiff':
                        args.push('-vn', '-c:a', 'pcm_s16be');
                        break;
                    case 'gif':
                        args.push('-vf', 'fps=10,scale=480:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse', '-loop', '0');
                        break;
                    case 'jpg': case 'jpeg':
                        args.push('-vframes', '1', '-q:v', '2');
                        break;
                    case 'png':
                        args.push('-vframes', '1');
                        break;
                    case 'webp':
                        args.push('-vframes', '1', '-quality', '90');
                        break;
                    case 'bmp': case 'tiff':
                        args.push('-vframes', '1');
                        break;
                    default:
                        args.push('-c', 'copy');
                }
                return args;
            },
            getMime(format) {
                const mimes = {
                    mp4: 'video/mp4', webm: 'video/webm', mkv: 'video/x-matroska',
                    avi: 'video/x-msvideo', mov: 'video/quicktime', '3gp': 'video/3gpp',
                    flv: 'video/x-flv', ts: 'video/mp2t', wmv: 'video/x-ms-wmv',
                    mpg: 'video/mpeg', mpeg: 'video/mpeg', ogv: 'video/ogg',
                    mp3: 'audio/mpeg', aac: 'audio/aac', m4a: 'audio/mp4',
                    ogg: 'audio/ogg', opus: 'audio/opus', wav: 'audio/wav',
                    flac: 'audio/flac', wma: 'audio/x-ms-wma', aiff: 'audio/aiff',
                    jpg: 'image/jpeg', png: 'image/png', gif: 'image/gif',
                    webp: 'image/webp', bmp: 'image/bmp', tiff: 'image/tiff'
                };
                return mimes[format] || 'application/octet-stream';
            }
        };

        // ===== CONVERTER =====
        const converter = {
            async process() {
                if (state.files.length === 0 || state.isProcessing) return;

                state.isProcessing = true;
                elements.convertBtn.disabled = true;
                elements.convertBtn.classList.add('loading');

                const format = elements.targetFormat.value;
                const settings = {
                    quality: elements.qualityMode.value,
                    resolution: elements.resolution.value,
                    audioBitrate: elements.audioQuality.value
                };

                for (let i = 0; i < state.files.length; i++) {
                    const file = state.files[i];
                    queue.update(i, 'processing', 0);

                    try {
                        await this.convert(file, i, format, settings);
                        state.completedCount++;
                        queue.update(i, 'completed', 100);
                    } catch (err) {
                        console.error(`Error: ${file.name}`, err);
                        state.errorCount++;
                        queue.update(i, 'error');
                        notify.show(`${utils.truncate(file.name, 20)} hata!`, 'error');
                    }

                    // Memory cleanup
                    try {
                        state.ffmpeg.FS('unlink', 'input');
                        state.ffmpeg.FS('unlink', `output.${format}`);
                    } catch (e) {}
                }

                state.isProcessing = false;
                elements.convertBtn.disabled = false;
                elements.convertBtn.classList.remove('loading');

                if (state.errorCount === 0) {
                    notify.show(`🎉 ${state.completedCount} dosya tamamlandı!`, 'success');
                } else {
                    notify.show(`${state.completedCount} başarılı, ${state.errorCount} hatalı`, 'warning');
                }
            },

            async convert(file, index, format, settings) {
                const inputName = 'input';
                const outputName = `output.${format}`;

                // Read file
                const fileData = await this.readFile(file);
                state.ffmpeg.FS('writeFile', inputName, fileData);

                // Build args
                const args = encoder.buildArgs(inputName, format, settings);
                args.push(outputName);

                // Progress handler
                state.ffmpeg.setProgress(({ ratio }) => {
                    const pct = Math.min(Math.round(ratio * 100), 99);
                    queue.update(index, 'processing', pct);
                });

                // Run
                await state.ffmpeg.run(...args);

                // Read output
                const output = state.ffmpeg.FS('readFile', outputName);
                const blob = new Blob([output.buffer], { type: encoder.getMime(format) });

                // Download
                const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${baseName}_converted.${format}`;
                link.click();
                setTimeout(() => URL.revokeObjectURL(link.href), 1000);
            },

            readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(new Uint8Array(reader.result));
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }
        };

        // ===== FFMPEG INITIALIZATION =====
        async function initFFmpeg() {
            try {
                elements.statusText.textContent = 'FFmpeg yükleniyor...';

                // Load FFmpeg script
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';
                
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('FFmpeg script yüklenemedi'));
                    document.head.appendChild(script);
                });

                // Create FFmpeg instance
                const { createFFmpeg, fetchFile } = FFmpeg;
                
                state.ffmpeg = createFFmpeg({
                    log: false,
                    corePath: FFMPEG_CONFIG.coreURL,
                    // This is the key fix - we're not using worker for this version
                    mainName: 'main'
                });

                // Store fetchFile globally for converter
                window.ffmpegFetchFile = fetchFile;

                elements.statusText.textContent = 'FFmpeg başlatılıyor...';
                await state.ffmpeg.load();

                state.isLoaded = true;
                elements.statusDot.classList.add('ready');
                elements.statusText.textContent = 'FFmpeg hazır ✓';

                if (state.files.length > 0) {
                    elements.convertBtn.disabled = false;
                }

                notify.show('FFmpeg başarıyla yüklendi!', 'success', 3000);

            } catch (error) {
                console.error('FFmpeg init error:', error);
                elements.statusDot.classList.add('error');
                elements.statusText.textContent = 'FFmpeg yüklenemedi';
                notify.show(`Hata: ${error.message}`, 'error', 0);
            }
        }

        // ===== EVENT LISTENERS =====
        function setupEvents() {
            elements.fileInput.addEventListener('change', e => {
                fileHandler.handle(e.target.files);
            });

            elements.fileZone.addEventListener('click', () => {
                elements.fileInput.click();
            });

            elements.convertBtn.addEventListener('click', () => {
                converter.process();
            });

            fileHandler.setupDragDrop();

            // Keyboard shortcut
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    elements.fileInput.click();
                }
            });
        }

        // ===== START =====
        document.addEventListener('DOMContentLoaded', () => {
            setupEvents();
            initFFmpeg();
        });
    </script>
</body>
</html>
