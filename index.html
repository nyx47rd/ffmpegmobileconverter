<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Media Morph Beast</title>
    
    <!-- FFmpeg v0.12 Core ve Utils (Resmi CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --card2: #1e293b;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
            --dim: #64748b;
            --border: rgba(255,255,255,0.08);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--success));
        }
        .header { text-align: center; margin-bottom: 1.25rem; }
        .logo {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 0.6rem;
            color: var(--dim);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Status */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(59,130,246,0.08);
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--warning);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        .dot.ok { background: var(--success); animation: none; }
        .dot.err { background: var(--error); animation: none; }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.4; transform:scale(0.7); }
        }

        /* File zone */
        .file-zone {
            border: 2px dashed var(--border);
            padding: 2rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            background: rgba(30,41,59,0.3);
        }
        .file-zone:hover, .file-zone.drag { border-color: var(--accent); background: rgba(59,130,246,0.06); transform: translateY(-2px); }
        .file-zone.has { border-color: var(--success); border-style: solid; }
        .file-zone .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .file-zone .title { font-weight: 700; font-size: 0.95rem; }
        .file-zone .hint { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }
        .file-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--success);
            color: #fff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Config */
        .config { display: grid; gap: 10px; margin: 1.25rem 0; }
        @media(min-width:400px) { .config { grid-template-columns: 1fr 1fr; } }
        .input-box { background: var(--card2); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .input-box.full { grid-column: 1/-1; }
        .lbl { font-size: 0.6rem; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
        .sel-wrap { position: relative; }
        .sel-wrap::after { content: '▾'; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 0.7rem; color: var(--dim); pointer-events: none; }
        select { appearance: none; background: transparent; border: none; color: var(--text); width: 100%; font-weight: 700; font-size: 0.85rem; cursor: pointer; padding-right: 16px; outline: none; }
        option, optgroup { background: var(--card); color: var(--text); }
        optgroup { color: var(--accent); }

        /* Button */
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 14px; border-radius: 12px; font-weight: 800; font-size: 0.92rem;
            cursor: pointer; transition: 0.25s; text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn.loading { color: transparent; position: relative; }
        .btn.loading::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border: 2px solid #fff; border-top-color: transparent; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Queue */
        .queue-box { margin-top: 1.25rem; max-height: 300px; overflow-y: auto; }
        .queue-head { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.72rem; color: var(--muted); font-weight: 700; }
        .q-item { background: var(--card2); padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .q-item.completed { border-left-color: var(--success); }
        .q-item.error { border-left-color: var(--error); }
        .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .q-name { font-weight: 700; font-size: 0.78rem; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .q-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--dim); color: #fff;}
        .q-badge.processing { background: var(--warning); color: #000; }
        .q-badge.completed { background: var(--success); }
        .q-badge.error { background: var(--error); }
        .p-bar { width: 100%; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .p-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--success)); transition: width 0.2s; }
        .p-fill.err { background: var(--error); }

        .footer { margin-top: 1.25rem; padding-top: 12px; border-top: 1px solid var(--border); text-align: center; }
        .footer p { font-size: 0.62rem; color: var(--dim); }

        .toast {
            position: fixed; bottom: 16px; left: 16px; right: 16px; max-width: 380px; margin: 0 auto;
            padding: 12px 16px; border-radius: 12px; font-size: 0.82rem; font-weight: 600;
            z-index: 9999; display: flex; align-items: center; gap: 8px; animation: toastIn 0.3s;
        }
        @keyframes toastIn { from { opacity:0; transform:translateY(16px); } }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--error); color: #fff; }
        .toast.warning { background: var(--warning); color: #000; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="logo">Media Morph Beast</h1>
            <p class="tagline">50+ Format • Güvenli • Tarayıcıda Çalışır</p>
        </header>

        <div class="status">
            <span class="dot" id="dot"></span>
            <span id="statusMsg">Sistem Başlatılıyor...</span>
        </div>

        <div class="file-zone" id="dropZone" tabindex="0">
            <input type="file" id="fileIn" multiple accept="video/*,audio/*,image/*" class="sr-only">
            <span class="icon">📁</span>
            <p class="title" id="fileTxt">Dosya Seçin veya Sürükleyin</p>
            <p class="hint">Video, ses, görsel — hepsi desteklenir</p>
        </div>

        <section class="config">
            <div class="input-box">
                <div class="lbl">🎯 Hedef Format</div>
                <div class="sel-wrap">
                    <select id="fmt">
                        <optgroup label="Video">
                            <option value="mp4">MP4 (Evrensel)</option>
                            <option value="webm">WebM (VP9)</option>
                            <option value="mkv">MKV</option>
                            <option value="avi">AVI</option>
                            <option value="mov">MOV</option>
                        </optgroup>
                        <optgroup label="Ses">
                            <option value="mp3">MP3</option>
                            <option value="aac">AAC</option>
                            <option value="wav">WAV</option>
                            <option value="ogg">OGG</option>
                            <option value="flac">FLAC</option>
                        </optgroup>
                        <optgroup label="Görsel & Animasyon">
                            <option value="gif">GIF</option>
                            <option value="jpg">JPG</option>
                            <option value="png">PNG</option>
                            <option value="webp">WebP</option>
                        </optgroup>
                    </select>
                </div>
            </div>
            <div class="input-box">
                <div class="lbl">⚡ Kalite Modu</div>
                <div class="sel-wrap">
                    <select id="qMode">
                        <option value="balanced">⚖️ Dengeli (Önerilen)</option>
                        <option value="quality">💎 Yüksek Kalite</option>
                        <option value="speed">🚀 Hızlı Dönüşüm</option>
                        <option value="tiny">📦 Min. Boyut</option>
                    </select>
                </div>
            </div>
        </section>

        <button class="btn" id="goBtn" disabled>🚀 DÖNÜŞTÜRMEYE BAŞLA</button>

        <section class="queue-box" id="qBox" hidden>
            <div class="queue-head">
                <span>📋 İşlem Kuyruğu</span>
                <span id="qStats">0/0</span>
            </div>
            <div id="qList"></div>
        </section>
        
        <footer class="footer"><p>Dosyalarınız sunucuya gönderilmez.</p></footer>
    </main>

    <div id="toasts"></div>

    <script>
    (async function () {
        'use strict';

        // ===== DEĞİŞKENLER VE DOM =====
        let ffmpeg = null;
        const S = { loaded: false, busy: false, files: [], done: 0, errs: 0 };
        const el = id => document.getElementById(id);
        const D = {
            dot: el('dot'), statusMsg: el('statusMsg'), dropZone: el('dropZone'),
            fileIn: el('fileIn'), fileTxt: el('fileTxt'), fmt: el('fmt'), 
            qMode: el('qMode'), goBtn: el('goBtn'), qBox: el('qBox'), 
            qList: el('qList'), qStats: el('qStats'), toasts: el('toasts')
        };

        // ===== YARDIMCI FONKSİYONLAR =====
        function fmtBytes(b) {
            if (!b) return '0 B';
            const i = Math.floor(Math.log(b) / Math.log(1024));
            return (b / Math.pow(1024, i)).toFixed(1) + ' ' + ['B','KB','MB','GB'][i];
        }
        function ext(n) { return n.split('.').pop().toLowerCase(); }
        function trunc(n) { return n.length > 20 ? n.slice(0, 15) + '...' + ext(n) : n; }
        
        function toast(msg, type = 'success') {
            const d = document.createElement('div');
            d.className = 'toast ' + type;
            d.innerHTML = `<span>${msg}</span><button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:#fff;cursor:pointer">×</button>`;
            D.toasts.appendChild(d);
            setTimeout(() => { if(d.parentElement) d.remove(); }, 4000);
        }

        // ===== FFMPEG BAŞLATMA (v0.12 KESİN ÇÖZÜM) =====
        async function initFFmpeg() {
            try {
                // FFmpeg ve FetchFile global objelerini v0.12 CDN'den çekiyoruz
                const { FFmpeg } = window.FFmpeg;
                const { toBlobURL, fetchFile } = window.FFmpegUtil;

                ffmpeg = new FFmpeg();
                
                D.statusMsg.textContent = 'Motor indiriliyor...';
                
                // HATA DÜZELTEN KISIM: JS ve WASM dosyalarını Blob olarak zorla okutuyoruz
                const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
                
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm')
                });

                S.loaded = true;
                D.dot.classList.add('ok');
                D.statusMsg.textContent = 'Sistem Hazır ✓';
                
                if(S.files.length) D.goBtn.disabled = false;
                toast('Motor başarıyla yüklendi!');

            } catch (err) {
                console.error(err);
                D.dot.classList.add('err');
                D.statusMsg.textContent = 'Hata oluştu!';
                toast('Yükleme Hatası: ' + err.message, 'error');
            }
        }

        // ===== KUYRUK VE DOSYA YÖNETİMİ =====
        function renderQueue() {
            if (!S.files.length) { D.qBox.hidden = true; return; }
            D.qBox.hidden = false;
            D.qList.innerHTML = S.files.map((f, i) => `
                <div class="q-item" id="q${i}">
                    <div class="q-head">
                        <span class="q-name">${trunc(f.name)}</span>
                        <span class="q-badge waiting" id="s${i}">Bekliyor</span>
                    </div>
                    <div class="p-bar"><div class="p-fill" id="p${i}"></div></div>
                </div>
            `).join('');
            D.qStats.textContent = `0/${S.files.length}`;
        }

        function handleFiles(files) {
            if (!files.length) return;
            S.files = Array.from(files);
            S.done = 0; S.errs = 0;
            D.dropZone.classList.add('has');
            D.fileTxt.innerHTML = `<strong>${S.files.length} Dosya</strong><div class="file-count">${fmtBytes(S.files.reduce((a,f)=>a+f.size,0))}</div>`;
            D.goBtn.disabled = !S.loaded;
            renderQueue();
        }

        // ===== DÖNÜŞTÜRME MOTORU =====
        async function convert() {
            if (!S.files.length || S.busy || !S.loaded) return;
            S.busy = true; D.goBtn.disabled = true; D.goBtn.classList.add('loading');
            const { fetchFile } = window.FFmpegUtil;

            const format = D.fmt.value;
            const qMode = D.qMode.value;
            
            // Basit FFmpeg Argümanları
            const getArgs = (f) => {
                const isVideo = ['mp4','webm','mkv','avi','mov'].includes(f);
                const isAudio = ['mp3','aac','wav','ogg','flac'].includes(f);
                const preset = qMode === 'speed' || qMode === 'tiny' ? 'ultrafast' : 'medium';
                const crf = qMode === 'quality' ? '18' : qMode === 'tiny' ? '35' : '23';

                if(isVideo) return ['-c:v', 'libx264', '-preset', preset, '-crf', crf, '-c:a', 'aac'];
                if(isAudio) return ['-vn', '-b:a', '192k'];
                if(f === 'gif') return ['-vf', 'fps=10,scale=480:-1:flags=lanczos', '-loop', '0'];
                return []; // Görseller için default
            };

            for (let i = 0; i < S.files.length; i++) {
                const file = S.files[i];
                const qItem = el('q'+i); const badge = el('s'+i); const bar = el('p'+i);
                
                badge.textContent = 'İşleniyor...';
                badge.className = 'q-badge processing';

                // İlerleme Çubuğu Event'i (v0.12 syntax)
                ffmpeg.on('progress', ({ progress }) => {
                    const pct = Math.min(Math.round(progress * 100), 99);
                    bar.style.width = pct + '%';
                });

                try {
                    const inName = 'input_' + i;
                    const outName = 'output_' + i + '.' + format;

                    await ffmpeg.writeFile(inName, await fetchFile(file));
                    await ffmpeg.exec(['-i', inName, ...getArgs(format), outName]);
                    
                    const data = await ffmpeg.readFile(outName);
                    
                    // İndirme tetikleyici
                    const blob = new Blob([data.buffer]);
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `${file.name.split('.')[0]}_converted.${format}`;
                    link.click();

                    bar.style.width = '100%';
                    badge.textContent = 'Tamamlandı ✓';
                    badge.className = 'q-badge completed';
                    S.done++;

                    // Hafıza Temizliği
                    await ffmpeg.deleteFile(inName);
                    await ffmpeg.deleteFile(outName);

                } catch (err) {
                    console.error(err);
                    bar.classList.add('err');
                    badge.textContent = 'Hata!';
                    badge.className = 'q-badge error';
                    S.errs++;
                }
                D.qStats.textContent = `${S.done}/${S.files.length}`;
            }

            S.busy = false; D.goBtn.disabled = false; D.goBtn.classList.remove('loading');
            toast(`İşlem Bitti! ${S.done} başarılı, ${S.errs} hatalı.`, S.errs ? 'warning' : 'success');
        }

        // ===== EVENT DİNLEYİCİLERİ =====
        D.fileIn.onchange = e => handleFiles(e.target.files);
        D.dropZone.onclick = () => D.fileIn.click();
        D.dropZone.ondragover = e => { e.preventDefault(); D.dropZone.classList.add('drag'); };
        D.dropZone.ondragleave = () => D.dropZone.classList.remove('drag');
        D.dropZone.ondrop = e => { e.preventDefault(); D.dropZone.classList.remove('drag'); handleFiles(e.dataTransfer.files); };
        D.goBtn.onclick = convert;

        // Sistemi Başlat
        initFFmpeg();
    })();
    </script>
</body>
</html>
