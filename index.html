<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Morph Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --bg: #030712; --card: #0f172a; --accent: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: screen; height: 100vh; }
        .container { background: var(--card); width: 90%; max-width: 400px; padding: 2rem; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        h1 { font-size: 1.8rem; font-weight: 900; margin: 0; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #64748b; font-size: 0.7rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px; }
        .file-zone { border: 2px dashed #1e293b; padding: 2rem; border-radius: 1.5rem; cursor: pointer; transition: 0.3s; margin-bottom: 1.5rem; }
        .file-zone:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .controls { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
        .control-group { background: #1e293b; padding: 10px; border-radius: 1rem; text-align: left; }
        label { font-size: 10px; color: #94a3b8; font-weight: bold; display: block; margin-bottom: 5px; }
        select { background: none; border: none; color: white; width: 100%; font-weight: bold; outline: none; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 1.2rem; border-radius: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #progressBox { margin-top: 1.5rem; }
        .bar-bg { width: 100%; background: #1e293b; height: 6px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
        .status-text { font-size: 10px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>Media Morph Pro</h1>
    <p>S24 Ultra Native Engine</p>

    <input type="file" id="fileInput" style="display:none">
    <div class="file-zone" onclick="document.getElementById('fileInput').click()">
        <div id="fileInfo" style="font-weight: bold; font-size: 0.9rem;">📥 Dosyayı Seç</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>FORMAT</label>
            <select id="format">
                <option value="mp4">MP4</option>
                <option value="webm">AV1</option>
                <option value="gif">GIF</option>
                <option value="mp3">MP3</option>
            </select>
        </div>
        <div class="control-group">
            <label>KALİTE</label>
            <select id="quality">
                <option value="23">Dengeli</option>
                <option value="18">Ultra</option>
                <option value="32">Küçük</option>
            </select>
        </div>
    </div>

    <button id="convertBtn">DÖNÜŞTÜRMEYİ BAŞLAT</button>

    <div id="progressBox" style="display:none">
        <div style="display:flex; justify-content: space-between">
            <span id="status" class="status-text">HAZIRLANIYOR...</span>
            <span id="percent" style="font-size: 10px; font-weight: bold;">0%</span>
        </div>
        <div class="bar-bg"><div id="bar"></div></div>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const bar = document.getElementById('bar');
    const percentText = document.getElementById('percent');

    fileInput.onchange = (e) => {
        if(e.target.files[0]) document.getElementById('fileInfo').innerText = "✅ " + e.target.files[0].name.substring(0, 15) + "...";
    };

    convertBtn.onclick = async () => {
        const file = fileInput.files[0];
        if(!file) return alert("Dosya seç!");

        document.getElementById('progressBox').style.display = 'block';
        convertBtn.disabled = true;

        if(!ffmpeg.isLoaded()) await ffmpeg.load();

        ffmpeg.FS('writeFile', 'input', await fetchFile(file));
        
        ffmpeg.setProgress(({ ratio }) => {
            const p = Math.round(ratio * 100);
            bar.style.width = p + '%';
            percentText.innerText = p + '%';
            document.getElementById('status').innerText = "İŞLENİYOR...";
        });

        const fmt = document.getElementById('format').value;
        const q = document.getElementById('quality').value;
        
        let args = ['-i', 'input'];
        if(fmt === 'mp4') args.push('-c:v', 'libx264', '-crf', q, '-preset', 'ultrafast', '-c:a', 'aac');
        if(fmt === 'webm') args.push('-c:v', 'libaom-av1', '-crf', q, '-b:v', '0', '-preset', '8', '-c:a', 'libopus');
        if(fmt === 'gif') args.push('-vf', 'fps=10,scale=480:-1:flags=lanczos');
        if(fmt === 'mp3') args.push('-vn', '-ab', '192k');
        args.push('output.' + fmt);

        await ffmpeg.run(...args);

        const data = ffmpeg.FS('readFile', 'output.' + fmt);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([data.buffer]));
        a.download = "MediaMorph_" + Date.now() + "." + fmt;
        a.click();
        
        document.getElementById('status').innerText = "TAMAMLANDI!";
        convertBtn.disabled = false;
    };
</script>
</body>
</html>
